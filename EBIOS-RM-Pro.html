<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self';">
    <title>EBIOS RM Pro v6.0</title>
    <script src="libs/tailwindcss.js"></script>
    <script>window.tailwind || document.write('<script src="https://cdn.tailwindcss.com"><\/script>')</script>
    <script src="libs/docx.umd.min.js"></script>
    <script>window.docx || document.write('<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"><\/script>')</script>
    <script src="libs/FileSaver.min.js"></script>
    <script>window.saveAs || document.write('<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"><\/script>')</script>
    <script src="libs/chart.js"></script>
    <script>window.Chart || document.write('<script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script>')</script>
    <script src="libs/mermaid.min.js"></script>
    <script>window.mermaid || document.write('<script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"><\/script>')</script>
    <style>
        * {
            font-family: 'Segoe UI', system-ui, sans-serif;
            box-sizing: border-box
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px
        }

        ::-webkit-scrollbar-track {
            background: #1e293b
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px
        }

        .sidebar {
            width: 240px;
            min-width: 240px;
            transition: all .3s
        }

        .sidebar.collapsed {
            width: 50px;
            min-width: 50px
        }

        .sidebar.collapsed .stxt {
            display: none
        }

        .wnav.active {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            align-items: center;
            justify-content: center
        }

        .modal.active {
            display: flex
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 11px;
            margin: 2px
        }

        .editable:hover {
            background: rgba(59, 130, 246, 0.1);
            cursor: pointer
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2)
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            transition: all .2s
        }

        .btn-blue {
            background: #2563eb;
            color: #fff
        }

        .btn-blue:hover {
            background: #1d4ed8
        }

        .btn-red {
            background: #dc2626;
            color: #fff
        }

        .btn-red:hover {
            background: #b91c1c
        }

        .btn-green {
            background: #16a34a;
            color: #fff
        }

        .btn-green:hover {
            background: #15803d
        }

        .btn-purple {
            background: #7c3aed;
            color: #fff
        }

        .btn-purple:hover {
            background: #6d28d9
        }

        .btn-orange {
            background: #ea580c;
            color: #fff
        }

        .btn-orange:hover {
            background: #c2410c
        }

        .btn-gray {
            background: #475569;
            color: #fff
        }

        .btn-gray:hover {
            background: #334155
        }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #334155
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        th {
            background: #1e293b;
            padding: 10px 12px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 600
        }

        td {
            padding: 10px 12px;
            border-top: 1px solid #334155;
            color: #fff
        }

        tr:hover {
            background: rgba(59, 130, 246, 0.05)
        }

        .radar-container {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background: radial-gradient(circle, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border-radius: 50%;
            border: 2px solid #334155
        }

        .radar-ring {
            position: absolute;
            border: 1px solid #334155;
            border-radius: 50%
        }

        .radar-point {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all .2s
        }

        .radar-point:hover {
            transform: translate(-50%, -50%) scale(1.3);
            z-index: 10
        }

        /* Couleurs niveau 1-4 */
        .lvl-1 {
            color: #22c55e !important
        }

        .bg-lvl-1 {
            background: #22c55e20;
            border-color: #22c55e
        }

        .lvl-2 {
            color: #eab308 !important
        }

        .bg-lvl-2 {
            background: #eab30820;
            border-color: #eab308
        }

        .lvl-3 {
            color: #f97316 !important
        }

        .bg-lvl-3 {
            background: #f9731620;
            border-color: #f97316
        }

        .lvl-4 {
            color: #dc2626 !important
        }

        .bg-lvl-4 {
            background: #dc262620;
            border-color: #dc2626
        }

        /* Texte blanc global */
        body,
        p,
        span,
        div,
        label,
        option {
            color: #fff
        }

        .text-slate-400 {
            color: #94a3b8 !important
        }

        .text-slate-500 {
            color: #64748b !important
        }
    </style>
</head>

<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex">

    <!-- Sidebar -->

                <p class="text-slate-500 text-xs">v6.0 • ANSSI</p>

        </div>
        <nav class="flex-1 p-2 overflow-y-auto">
            <div class="stxt text-slate-500 text-[10px] uppercase tracking-wider px-2 py-1">Ateliers</div>
            <button onclick="goW(1)"
                class="wnav w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left mb-0.5 text-slate-400 hover:bg-slate-800"
                data-w="1"><span
                    class="w-7 h-7 rounded bg-blue-600 flex items-center justify-center font-bold text-xs text-white shrink-0">1</span><span
                    class="stxt text-sm">Cadrage</span></button>
            <button onclick="goW(2)"
                class="wnav w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left mb-0.5 text-slate-400 hover:bg-slate-800"
                data-w="2"><span
                    class="w-7 h-7 rounded bg-red-600 flex items-center justify-center font-bold text-xs text-white shrink-0">2</span><span
                    class="stxt text-sm">Sources Risque</span></button>
            <button onclick="goW(3)"
                class="wnav w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left mb-0.5 text-slate-400 hover:bg-slate-800"
                data-w="3"><span
                    class="w-7 h-7 rounded bg-purple-600 flex items-center justify-center font-bold text-xs text-white shrink-0">3</span><span
                    class="stxt text-sm">Stratégiques</span></button>
            <button onclick="goW(4)"
                class="wnav w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left mb-0.5 text-slate-400 hover:bg-slate-800"
                data-w="4"><span
                    class="w-7 h-7 rounded bg-orange-600 flex items-center justify-center font-bold text-xs text-white shrink-0">4</span><span
                    class="stxt text-sm">Opérationnels</span></button>
            <button onclick="goW(5)"
                class="wnav w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left mb-0.5 text-slate-400 hover:bg-slate-800"
                data-w="5"><span
                    class="w-7 h-7 rounded bg-green-600 flex items-center justify-center font-bold text-xs text-white shrink-0">5</span><span
                    class="stxt text-sm">Traitement</span></button>
            <div class="stxt text-slate-500 text-[10px] uppercase tracking-wider px-2 py-1 mt-3">Synthèse</div>
            <button onclick="goW(6)"
                class="wnav w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left mb-0.5 text-slate-400 hover:bg-slate-800"
                data-w="6"><span
                    class="w-7 h-7 rounded bg-cyan-600 flex items-center justify-center text-xs shrink-0">📊</span><span
                    class="stxt text-sm">Dashboard</span></button>
            <div class="stxt text-slate-500 text-[10px] uppercase tracking-wider px-2 py-1 mt-3">Ressources</div>
            <button onclick="showMitre()"
                class="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left mb-0.5 text-slate-400 hover:bg-slate-800"><span
                    class="w-7 h-7 rounded bg-rose-700 flex items-center justify-center text-xs shrink-0">⚔️</span><span
                    class="stxt text-sm">MITRE ATT&CK</span></button>
            <button onclick="showBDC()"
                class="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left mb-0.5 text-slate-400 hover:bg-slate-800"><span
                    class="w-7 h-7 rounded bg-indigo-600 flex items-center justify-center text-xs shrink-0">📚</span><span
                    class="stxt text-sm">Base ANSSI</span></button>
        </nav>
        <div class="p-2 border-t border-slate-700">
            <div class="stxt text-[10px] text-slate-500 mb-1 px-1">Projet: <span class="text-white"
                    id="projName">-</span></div>
            <div class="flex gap-1">
                <button onclick="expJSON()"
                    class="flex-1 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded text-xs">💾</button>
                <button onclick="expWord()"
                    class="flex-1 py-1.5 bg-blue-700 hover:bg-blue-600 text-white rounded text-xs"

                <button onclick="toggleSB()"
                    class="py-1.5 px-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded text-xs">◀</button>

    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-h-screen overflow-hidden">

            <div>

            <div class="flex items-center gap-2">

        <div class="flex-1 p-5 overflow-y-auto" id="main"></div>

    <!-- Modals -->
    <div id="startModal" class="modal active">
        <div class="bg-slate-800 rounded-2xl p-6 max-w-md w-full border border-slate-600">
            <div class="text-center mb-5">
                <div
                    class="w-20 h-20 bg-gradient-to-br from-blue-500 via-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-3">
                    🛡️</div>
                <h2 class="text-xl font-bold text-white">EBIOS RM Pro v6.0</h2>
                <p class="text-slate-400 text-sm mt-1">Analyse de Risques • ANSSI • MITRE ATT&CK</p>
            </div>
            <div id="savedBox" class="hidden mb-4 p-3 bg-blue-500/20 border border-blue-500/50 rounded-lg">
                <p class="text-blue-300 text-sm font-medium">📁 Analyse détectée</p>
                <p class="text-slate-400 text-xs mt-0.5" id="savedInfo"></p>
            </div>
            <div class="space-y-2">
                <button onclick="loadSaved()" id="btnResume" class="hidden w-full py-2.5 btn btn-blue">📂
                    Reprendre</button>
                <button onclick="startNew()" class="w-full py-2.5 btn btn-green">✨ Nouvelle analyse</button>
                <button onclick="document.getElementById('fileIn').click()" class="w-full py-2.5 btn btn-gray">📥
                    Importer JSON</button>
            </div>
            <input type="file" id="fileIn" accept=".json" class="hidden" onchange="impJSON(event)">
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="bg-slate-800 rounded-xl p-5 max-w-lg w-full border border-slate-600 max-h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-white" id="editTitle">Modifier</h3><button onclick="closeEdit()"
                    class="text-slate-400 hover:text-white text-xl">&times;</button>
            </div>
            <div id="editBody"></div>
            <div class="flex gap-2 mt-4">
                <button onclick="saveEdit()" class="flex-1 btn btn-blue">Enregistrer</button>
                <button onclick="closeEdit()" class="flex-1 btn btn-gray">Annuler</button>
            </div>
        </div>
    </div>

    <div id="mitreModal" class="modal">
        <div class="bg-slate-800 rounded-xl p-5 max-w-5xl w-full border border-slate-600 max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-lg font-bold text-white">⚔️ MITRE ATT&CK</h3><button onclick="closeMitre()"
                    class="text-slate-400 hover:text-white text-xl">&times;</button>
            </div>
            <input type="text" id="mitreQ"
                class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm mb-3"

            <div id="mitreGrid" class="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            </div>
        </div>

    <div id="bdcModal" class="modal">
        <div class="bg-slate-800 rounded-xl p-5 max-w-5xl w-full border border-slate-600 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-lg font-bold text-white">📚 Base ANSSI</h3><button onclick="closeBDC()"
                    class="text-slate-400 hover:text-white text-xl">&times;</button>
            </div>
            <div id="bdcBody"></div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="bg-slate-800 rounded-xl p-5 max-w-sm w-full border border-slate-600">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-white">⚙️ Paramètres</h3><button onclick="closeSettings()"
                    class="text-slate-400 hover:text-white text-xl">&times;</button>
            </div>
            <div class="space-y-3">
                <div><label class="text-slate-400 text-xs">Nom du projet</label><input type="text" id="setName"
                        class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white mt-1"
                        onchange="D.meta.studyName=this.value;save();updUI()"></div>
                <div><label class="text-slate-400 text-xs">Organisation</label><input type="text" id="setOrg"
                        class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white mt-1"
                        onchange="D.meta.organization=this.value;save()"></div>
                <button onclick="if(confirm('Tout effacer?')){localStorage.clear();location.reload()}"
                    class="w-full mt-3 py-2 bg-red-600/20 text-red-400 rounded-lg text-sm">🗑️ Réinitialiser</button>
            </div>
        </div>
    </div>

    <div id="graphModal" class="modal">
        <div class="bg-slate-800 rounded-xl p-5 w-11/12 max-w-5xl border border-slate-600 flex flex-col" style="max-height:90vh">
            <div class="flex justify-between items-center mb-4 shrink-0">
                <h3 class="text-lg font-bold text-white">🗺️ Chemin d'Attaque (Graphe)</h3><button onclick="document.getElementById('graphModal').classList.remove('active')"
                    class="text-slate-400 hover:text-white text-xl">&times;</button>
            </div>
            <div id="graphBox" class="overflow-auto bg-slate-900 rounded-lg p-10 text-center"></div>
        </div>
    </div>

    <script>
        // ============ DATA ============
        const MITRE = {
            tactics: [
                { id: 'TA0043', n: 'Reconnaissance', c: '#64748b', t: ['Scan actif', 'Collecte infos', 'OSINT', 'Phishing recon'] },
                { id: 'TA0001', n: 'Initial Access', c: '#ef4444', t: ['Drive-by', 'Exploit public app', 'Phishing', 'Supply chain', 'Valid accounts', 'Hardware', 'Trusted relationship'] },
                { id: 'TA0002', n: 'Execution', c: '#f97316', t: ['Command line', 'PowerShell', 'Scripting', 'WMI', 'Scheduled task', 'User execution'] },
                { id: 'TA0003', n: 'Persistence', c: '#eab308', t: ['Boot autostart', 'Create account', 'Scheduled task', 'Registry', 'Services', 'Startup folder'] },
                { id: 'TA0004', n: 'Privilege Escalation', c: '#22c55e', t: ['Exploit vuln', 'Access token', 'Sudo exploit', 'DLL hijack', 'Setuid/Setgid'] },
                { id: 'TA0005', n: 'Defense Evasion', c: '#06b6d4', t: ['Obfuscation', 'Disable AV', 'Clear logs', 'Masquerading', 'Rootkit', 'Process injection'] },
                { id: 'TA0006', n: 'Credential Access', c: '#ec4899', t: ['Brute force', 'Credential dump', 'Keylogger', 'MitM', 'Password spray', 'Kerberoasting'] },
                { id: 'TA0007', n: 'Discovery', c: '#14b8a6', t: ['Account discovery', 'Network scan', 'System info', 'File discovery', 'Process discovery'] },
                { id: 'TA0008', n: 'Lateral Movement', c: '#f59e0b', t: ['Remote services', 'SMB/Admin shares', 'Pass the hash', 'RDP', 'SSH hijack'] },
                { id: 'TA0009', n: 'Collection', c: '#a855f7', t: ['Data staged', 'Screen capture', 'Keylogging', 'Email collection', 'Clipboard'] },
                { id: 'TA0011', n: 'Command & Control', c: '#6366f1', t: ['Web protocols', 'DNS tunnel', 'Proxy', 'Encrypted channel', 'Remote access tools'] },
                { id: 'TA0010', n: 'Exfiltration', c: '#dc2626', t: ['Exfil over C2', 'Exfil over web', 'Exfil to cloud', 'Scheduled transfer', 'Physical medium'] },
                { id: 'TA0040', n: 'Impact', c: '#991b1b', t: ['Data destruction', 'Ransomware', 'Defacement', 'DoS', 'Resource hijack', 'Wiper'] }
            ]
        };

        const BDC = {
            sources: ['État étranger', 'Officine spécialisée', 'Crime organisé', 'Concurrent', 'Terroriste', 'Hacktiviste', 'Attaquant interne', 'Amateur', 'Vengeur', 'Cyber-mercenaire'],
            objectifs: ['Espionnage', 'Pré-positionnement', 'Déstabilisation', 'Entrave', 'Lucratif', 'Atteinte image', 'Vengeance', 'Idéologique', 'Sabotage', 'Chantage'],
            typesVM: ['Processus métier', 'Service', 'Info stratégique', 'Info opérationnelle', 'Données perso', 'Données financières', 'Propriété intellectuelle', 'Infrastructure critique'],
            gravites: [{ id: 'G1', n: 'Mineure', c: '#22c55e' }, { id: 'G2', n: 'Significative', c: '#eab308' }, { id: 'G3', n: 'Grave', c: '#f97316' }, { id: 'G4', n: 'Critique', c: '#dc2626' }],
            vrais: [{ id: 'V1', n: 'Peu vrais.', c: '#22c55e' }, { id: 'V2', n: 'Vraisemblable', c: '#eab308' }, { id: 'V3', n: 'Très vrais.', c: '#f97316' }, { id: 'V4', n: 'Quasi-certain', c: '#dc2626' }],
            impacts: ['Missions', 'Sécurité personnes', 'Matériels', 'Environnement', 'Gouvernance', 'Financiers', 'Juridiques', 'Image'],
            refs: ['Guide hygiène ANSSI', 'ISO 27001', 'ISO 27002', 'ISO 27005', 'RGPD', 'NIS2', 'LPM', 'DORA', 'PCI-DSS', 'HDS', 'SecNumCloud', 'NIST CSF', 'SOC 2'],
            catPP: ['Clients', 'Fournisseurs', 'Prestataires IT', 'Sous-traitants', 'Partenaires', 'Filiales', 'Hébergeurs'],
            echelles: {
                dep: ['Non nécessaire', 'Utile', 'Important', 'Indispensable'],
                pen: ['Aucun accès', 'Limité', 'Étendu', 'Total'],
                mat: ['Inexistante', 'Partielle', 'Avancée', 'Optimale'],
                conf: ['Faible', 'Modérée', 'Élevée', 'Totale']
            },
            echellesNoms: { dep: 'DÉPENDANCE', pen: 'PÉNÉTRATION', mat: 'MATURITÉ', conf: 'CONFIANCE' },
            motivation: [{ v: 1, n: 'Faible', c: '#22c55e' }, { v: 2, n: 'Modérée', c: '#eab308' }, { v: 3, n: 'Forte', c: '#f97316' }, { v: 4, n: 'Très forte', c: '#dc2626' }],
            ressources: [{ v: 1, n: 'Limitées', c: '#22c55e' }, { v: 2, n: 'Significatives', c: '#eab308' }, { v: 3, n: 'Importantes', c: '#f97316' }, { v: 4, n: 'Illimitées', c: '#dc2626' }]
        };

        // Couleur selon niveau 1-4
        function getLvlColor(v) {
            v = parseInt(v);
            if (v === 1) return '#22c55e';
            if (v === 2) return '#eab308';
            if (v === 3) return '#f97316';
            return '#dc2626';
        }

        // Mapping canonique d'une tactique MITRE ATT&CK vers une phase opératoire
        // EBIOS RM : 0=Connaître, 1=Rentrer, 2=Trouver, 3=Exploiter. Source de
        // vérité unique partagée par renderMitre, w4, moveAction, genGraph et
        // l'export Word (tableau 4 phases + graphe Mermaid) pour éviter toute
        // divergence entre vues.
        function mitrePhase(tactic) {
            if (tactic === 'Reconnaissance') return 0;
            if (['Initial Access', 'Execution', 'Persistence', 'Privilege Escalation', 'Defense Evasion'].includes(tactic)) return 1;
            if (['Credential Access', 'Discovery', 'Lateral Movement', 'Collection'].includes(tactic)) return 2;

        // ============ SÉCURITÉ ============
        // Fonction d'échappement HTML pour prévenir les attaques XSS
        function esc(str) {
            if (str === null || str === undefined) return '';

            div.textContent = String(str);
            return div.innerHTML;
        }
        function trunc(str, len = 60) {
            if (!str) return '';
            const s = String(str);
            return s.length > len ? s.substring(0, len) + '...' : s;
        }

        // Validation de chaîne (longueur max, caractères autorisés)
        function sanitizeStr(str, maxLen = 500) {
            if (typeof str !== 'string') return '';
            return str.substring(0, maxLen).replace(/[<>]/g, '');
        }

        // Validation d'un nombre dans une plage
        function sanitizeNum(val, min = 1, max = 4) {
            const n = parseInt(val);
            if (isNaN(n)) return min;
            return Math.max(min, Math.min(max, n));

        // Schéma de validation pour l'import JSON. itemProps = champs obligatoires
        // de chaque item (réellement vérifiés à l'import). Noms alignés sur le

        const SCHEMA = {
            meta: { type: 'object', required: ['studyName'] },

            fe: { type: 'array', itemProps: ['id', 'bv', 'desc', 'g'] },
            baseline: { type: 'array', itemProps: ['id', 'ref', 'status'] },
            rs: { type: 'array', itemProps: ['id', 'type', 'mot', 'res'] },
            pp: { type: 'array', itemProps: ['id', 'name', 'cat'] },
            ss: { type: 'array', itemProps: ['id', 'srIds', 'g'] },
            os: { type: 'array', itemProps: ['id', 'ss', 'v'] },
            measures: { type: 'array', itemProps: ['id', 'measure', 'cat'] },
            erToSr: { type: 'array', itemProps: ['er', 'sr'] },
            customSources: { type: 'array' },

            risquesResiduels: { type: 'array', itemProps: ['id', 'riskId', 'gRes', 'vRes'] }

        function validateJSON(data) {
            if (!data || typeof data !== 'object') throw new Error('Format JSON invalide');
            // Vérifier la structure
            for (const [key, schema] of Object.entries(SCHEMA)) {
                if (data[key] !== undefined) {
                    if (schema.type === 'array' && !Array.isArray(data[key])) {
                        throw new Error(`${key} doit être un tableau`);
                    }
                    if (schema.type === 'object' && typeof data[key] !== 'object') {
                        throw new Error(`${key} doit être un objet`);
                    }
                    // Vérifier les propriétés requises des items
                    if (schema.itemProps && Array.isArray(data[key])) {
                        data[key].forEach((item, i) => {
                            if (typeof item !== 'object' || item === null) throw new Error(`${key}[${i}] invalide`);
                            for (const prop of schema.itemProps) {
                                if (item[prop] === undefined || item[prop] === null) throw new Error(`${key}[${i}] champ requis manquant: ${prop}`);
                            }
                        });
                    }
                }
            }
            // Nettoyer les données
            if (data.meta) {
                data.meta.studyName = sanitizeStr(data.meta.studyName || '', 100);

        function impJSON(e) {
            const f = e.target.files[0];

        async function genGraphSS(ssId) {
            const s = D.ss.find(x => x.id === ssId);

            let md = "flowchart TD\n";

            const ssNode = `SS_${s.id}`;
            md += `  ${ssNode}["SS: ${esc(s.desc).replace(/["']/g, '')}"]:::ss\n`;

            const srNodes = [];
            (s.srIds || []).forEach(sid => {
                const r = D.rs.find(x => x.id === sid);
                if (r) {
                    const srNode = `SR_${r.id}`;
                    const label = `SR: ${r.type}` + (r.objs && r.objs.length ? `<br>OV: ${r.objs.join(', ')}` : '');
                    md += `  ${srNode}["${label.replace(/["']/g, '')}"]:::attack\n`;
                    srNodes.push(srNode);
                }
            });

            const ppNodes = [];
            if (s.ppIds && s.ppIds.length > 0) {
                s.ppIds.forEach(pid => {
                    const p = D.pp.find(x => x.id === pid);
                    if (p) {
                        const ppNode = `PP_${p.id}`;
                        md += `  ${ppNode}["PP: ${esc(p.name).replace(/["']/g, '')}"]:::bs\n`;
                        ppNodes.push(ppNode);
                    }
                });
            }

            if (srNodes.length > 0) {
                srNodes.forEach(srNode => {
                    if (ppNodes.length > 0) {
                        ppNodes.forEach(ppNode => md += `  ${srNode} --> ${ppNode}\n`);
                    } else {
                        md += `  ${srNode} --> ${ssNode}\n`;
                    }
                });
                if (ppNodes.length > 0) {
                    ppNodes.forEach(ppNode => md += `  ${ppNode} --> ${ssNode}\n`);
                }
            }

            const erIds = s.erIds || [s.fe];
            const nodes = new Set();
            const links = new Set();
            
            erIds.filter(Boolean).forEach(eid => {
                const f = D.fe.find(x => x.id === eid);

                    nodes.add(`  ${erNode}["ER: ${esc(f.desc).replace(/["']/g, '')}"]:::impact\n`);
                    
                    const b = D.bv.find(x => x.id === f.bv);

                                links.add(`  ${bsNode} --> ${vmNode}\n`);
                                links.add(`  ${ssNode} --> ${bsNode}\n`);

                            links.add(`  ${ssNode} --> ${vmNode}\n`);
                        }
                    } else {
                        links.add(`  ${ssNode} --> ${erNode}\n`);
                    }

            nodes.forEach(n => md += n);

        }

        // ============ RISQUES RESIDUELS ============
        function addRR() {
            const riskId = parseInt(document.getElementById('rrRisk').value);
            if (!riskId || isNaN(riskId)) return alert('Sélectionnez un risque');
            const jalon = document.getElementById('rrJ').value ? sanitizeNum(document.getElementById('rrJ').value) : 0;
            if (D.risquesResiduels.some(rr => rr.riskId === riskId && rr.jalon === jalon)) {
                if (!confirm(jalon ? `Ce risque a déjà une évaluation résiduelle pour ce jalon (J${jalon}). Remplacer?` : 'Ce risque a déjà une évaluation résiduelle sans jalon. Remplacer?')) return;
                D.risquesResiduels = D.risquesResiduels.filter(rr => !(rr.riskId === riskId && rr.jalon === jalon));
            }
            const decision = document.getElementById('rrDec').value;
            if (!decision) return alert('Sélectionnez une décision de traitement');
            const justif = sanitizeStr(document.getElementById('rrJust').value, 500);
            if (hasInjection(justif)) return alert('Caractères non autorisés');
            const trans = sanitizeStr(document.getElementById('rrTrans').value, 200);
            if (hasInjection(trans)) return alert('Caractères non autorisés');
            if (decision === 'transféré' && !trans) return alert('Indiquez la cible du transfert');
            if ((decision === 'éviter' || decision === 'réduit') && !D.measures.some(m => (m.riskIds || [m.risk].filter(Boolean)).includes(riskId))) { if (!confirm('Aucune mesure PACS liée à ce risque. Continuer quand même ?')) return; }
            if (decision === 'accepté' && !justif) { if (!confirm('Aucun motif d\'acceptation renseigné. Continuer ?')) return; }
            D.risquesResiduels.push({
                id: gid(),
                riskId,
                gRes: sanitizeNum(document.getElementById('rrG').value),
                vRes: sanitizeNum(document.getElementById('rrV').value),
                jalon: jalon,
                justification: justif,
                decision,
                transferTarget: trans
            });
            document.getElementById('rrJust').value = ''; document.getElementById('rrTrans').value = ''; document.getElementById('rrDec').value = '';
            save(); render();
        }

        // Pré-remplit la gravité/vraisemblance résiduelle avec les valeurs actuelles du risque sélectionné
        function setRRDefaults() {
            const sel = document.getElementById('rrRisk');
            const opt = sel.options[sel.selectedIndex];
            if (opt && opt.dataset.g) {

                document.getElementById('rrV').value = opt.dataset.v;
            }
        }

        function delRR(id) { if (confirm('Supprimer cette évaluation?')) { D.risquesResiduels = D.risquesResiduels.filter(x => x.id !== id); save(); render(); } }

        function editRR(id) {
            editT = 'rr'; editI = id;
            const rr = D.risquesResiduels.find(x => x.id === id);

<div class="space-y-3">
<div class="bg-slate-800 p-2 rounded text-sm text-white">Risque: <span class="text-orange-400 font-bold">R${r?.i || '?'}</span> ${r?.name || '?'}</div>
<div class="grid grid-cols-2 gap-2">
<div><label class="text-slate-400 text-xs">Gravité résiduelle</label><select id="eRRG" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white mt-1">${[1, 2, 3, 4].map(g => `<option value="${g}" ${g === rr.gRes ? 'selected' : ''} style="color:${getLvlColor(g)}">G${g}</option>`).join('')}</select></div>

        function getRisks() {
            return D.os.map((o, i) => {
                const ss = D.ss.find(s => s.id === o.ss);
                const srList = ss ? (ss.srIds || []).map(sid => { const r = D.rs.find(x => x.id === sid); return r ? r.type : null; }).filter(Boolean).join(', ') : '?';
                const erList = ss ? (ss.erIds || [ss.fe]).map(eid => { const f = D.fe.find(x => x.id === eid); return f ? trunc(f.desc, 20) : null; }).filter(Boolean).join(', ') : '?';
                const g = ss ? parseInt(ss.g) : 1; const v = parseInt(o.v); return { id: o.id, i: i + 1, name: `${srList} → ${erList}`, g, v, level: g * v };
            });
        }

        // Renvoie l'évaluation résiduelle "retenue" d'un risque : jalon le plus élevé,
        // puis premier inséré en cas d'égalité (jalon=0). Centralise la logique utilisée
        // par l'Atelier 5, le Dashboard, la synthèse et les graphes pour éviter les divergences.
        function latestRR(riskId) {
            const rrs = D.risquesResiduels.filter(x => x.riskId === riskId);
            if (!rrs.length) return null;
            return rrs.sort((a, b) => b.jalon - a.jalon)[0];
        }

        // Épure les références mortes vers des objets supprimés (résiduels, mesures,
        // liens ER↔couple, références SS). N'efface aucun objet principal (SO/SS/ER/VM/couple).
        function cleanOrphans() {
            const riskIds = new Set(getRisks().map(r => r.id));
            const feIds = new Set(D.fe.map(f => f.id));
            const rsIds = new Set(D.rs.map(r => r.id));
            const ppIds = new Set(D.pp.map(p => p.id));
            let n = 0;
            const beforeRR = D.risquesResiduels.length;
            D.risquesResiduels = D.risquesResiduels.filter(rr => riskIds.has(rr.riskId));
            n += beforeRR - D.risquesResiduels.length;
            D.measures.forEach(m => {
                if (Array.isArray(m.riskIds)) { const b = m.riskIds.length; m.riskIds = m.riskIds.filter(id => riskIds.has(id)); n += b - m.riskIds.length; }
                else if (m.risk && !riskIds.has(m.risk)) { n++; delete m.risk; }
            });
            const beforeL = D.erToSr.length;
            D.erToSr = D.erToSr.filter(l => feIds.has(l.er) && rsIds.has(l.sr));
            n += beforeL - D.erToSr.length;
            D.ss.forEach(s => {
                if (Array.isArray(s.srIds)) { const b = s.srIds.length; s.srIds = s.srIds.filter(id => rsIds.has(id)); n += b - s.srIds.length; }
                if (Array.isArray(s.erIds)) { const b = s.erIds.length; s.erIds = s.erIds.filter(id => feIds.has(id)); n += b - s.erIds.length; }
                if (Array.isArray(s.ppIds)) { const b = s.ppIds.length; s.ppIds = s.ppIds.filter(id => ppIds.has(id)); n += b - s.ppIds.length; }
            });
            if (n > 0) { save(); render(); alert(n + ' référence(s) orpheline(s) nettoyée(s) — exportez le JSON pour conserver la correction.'); }
            else alert('Aucune référence orpheline à nettoyer.');
        }

        // ============ DASHBOARD ============
        function w6() {
            const risks = getRisks();
            const evaluated = risks.filter(r => D.risquesResiduels.some(rr => rr.riskId === r.id)).length;
            const erLinked = D.fe.filter(f => D.erToSr.some(l => l.er === f.id)).length;
            const srRetTotal = D.rs.filter(r => r.retained).length;
            const srCov = D.rs.filter(r => r.retained && D.ss.some(s => (s.srIds || []).includes(r.id))).length;
            const ssWithOS = D.ss.filter(s => D.os.some(o => o.ss === s.id)).length;
            const risksWithMeasure = risks.filter(r => D.measures.some(m => (m.riskIds || [m.risk].filter(Boolean)).includes(r.id))).length;
            const risksWithRR = risks.filter(r => D.risquesResiduels.some(rr => rr.riskId === r.id)).length;
            const vmWithMission = D.bv.filter(b => b.mission && D.missions.some(m => m.id === b.mission)).length;
            const cov = (label, n, total) => { const pct = total ? Math.round(n / total * 100) : 0; const c = pct >= 80 ? '#22c55e' : pct >= 50 ? '#eab308' : pct > 0 ? '#f97316' : '#dc2626'; return `<div class="bg-slate-900/50 rounded-lg p-3"><div class="flex justify-between text-xs mb-1"><span class="text-slate-400">${label}</span><span class="text-white font-bold">${n}/${total}</span></div><div class="w-full bg-slate-700 rounded-full h-2"><div class="h-2 rounded-full" style="width:${pct}%;background:${c}"></div></div></div>`; };
            const decCounts = { accepté: 0, éviter: 0, transféré: 0, réduit: 0 };
            D.risquesResiduels.forEach(rr => { if (decCounts[rr.decision] !== undefined) decCounts[rr.decision]++; });
            const decided = decCounts['accepté'] + decCounts['éviter'] + decCounts['transféré'] + decCounts['réduit'];
            const decCard = (label, n, color) => `<div class="bg-slate-900/50 rounded-lg p-3 text-center"><div class="text-2xl font-black" style="color:${color}">${n}</div><div class="text-white text-xs mt-1">${label}</div></div>`;
            const buildM = list => { const lc = l => l <= 4 ? '#22c55e' : l <= 8 ? '#eab308' : l <= 12 ? '#f97316' : '#dc2626'; let m = '<div></div>'; for (let v = 1; v <= 4; v++) m += `<div class="text-center text-xs text-white p-1" style="color:${getLvlColor(v)}">V${v}</div>`; for (let g = 4; g >= 1; g--) { m += `<div class="text-center text-xs p-1" style="color:${getLvlColor(g)}">G${g}</div>`; for (let v = 1; v <= 4; v++) { const col = lc(g * v); const cr = list.filter(r => r.g === g && r.v === v); m += `<div style="background:${col}20" class="p-1 rounded min-h-[30px] max-h-[60px] overflow-y-auto border border-slate-700 flex flex-wrap gap-0.5 items-center justify-center">${cr.map(r => `<span style="background:${col}" class="text-white text-[10px] px-1 rounded">R${r.i}</span>`).join('')}</div>`; } } return `<div class="grid grid-cols-5 gap-1">${m}</div>`; };
            const matrixInit = buildM(risks);
            const risksRes = risks.map(r => { const rr = latestRR(r.id); return rr ? { ...r, g: rr.gRes, v: rr.vRes, level: rr.gRes * rr.vRes } : r; });
            const matrixRes = buildM(risksRes);
            const mStat = { todo: D.measures.filter(m => m.status === 'todo').length, ongoing: D.measures.filter(m => m.status === 'ongoing').length, done: D.measures.filter(m => m.status === 'done').length };

        function calcSSGravity(erIds) {
            let g = 0;
            erIds.forEach(eid => { const fg = parseInt(D.fe.find(x => x.id === eid)?.g); if (Number.isFinite(fg) && fg > g) g = fg; });

        // Recalcule la gravité (max des ER) des scénarios stratégiques à partir
        // des ER qu'ils référencent. Si feId est fourni, ne resynchronise que
        // les SS incluant cet ER ; sinon resynchronise tous les SS (rattrape les
        // gravités gelées sur des données antérieures ou importées).
        function recomputeSSGravity(feId) {
            D.ss.forEach(s => {
                const erIds = s.erIds || [s.fe];
                if (feId && !erIds.includes(feId)) return;
                const g = String(calcSSGravity(erIds.filter(Boolean)));
                if (s.g !== g) s.g = g;
            });
        }
        function refreshSSGrav(srCls, erCls, gElId) {

                const erId = +cb.value;
                const ok = srIds.length > 0 && srIds.every(srId => D.erToSr.some(l => l.sr === srId && l.er === erId));
                cb.disabled = !ok;
                if (!ok) cb.checked = false;
            });
            const erIds = [...document.querySelectorAll('.' + erCls + ':checked')].map(c => +c.value);
            const gEl = document.getElementById(gElId);
            if (gEl) {
                if (!erIds.length) { gEl.textContent = '—'; gEl.style.color = ''; }
                else { const g = calcSSGravity(erIds); gEl.textContent = 'G' + g + ' — ' + (BDC.gravites[g - 1]?.n || ''); gEl.style.color = getLvlColor(g); }
            }
        }

                const byLvl = { f: risks.filter(r => r.level <= 4).length, m: risks.filter(r => r.level > 4 && r.level <= 8).length, e: risks.filter(r => r.level > 8 && r.level <= 12).length, c: risks.filter(r => r.level > 12).length };

                const pctDone = D.measures.length ? Math.round(mStat.done / D.measures.length * 100) : 0;

                const cell = (txt, w, opts = {}) => new TableCell({ borders: opts.noBorder ? noBorders : borders, width: { size: w, type: WidthType.PERCENTAGE }, shading: opts.fill ? { fill: opts.fill, type: ShadingType.CLEAR } : undefined, margins: { top: 40, bottom: 40, left: 60, right: 60 }, verticalAlign: VerticalAlign.CENTER, children: [new Paragraph({ alignment: opts.center ? AlignmentType.CENTER : AlignmentType.LEFT, children: [new TextRun({ text: String(txt || '-'), size: opts.size || 20, bold: opts.bold, color: opts.color })] })] });

                children.push(new Paragraph({
                    spacing: { after: 150 }, children: [
                        new TextRun({ text: 'J1 ', bold: true, size: 22, color: 'DC2626' }), new TextRun({ text: '(0-3 mois)   ', size: 20 }),
                        new TextRun({ text: 'J2 ', bold: true, size: 22, color: 'EA580C' }), new TextRun({ text: '(3-6 mois)   ', size: 20 }),
                        new TextRun({ text: 'J3 ', bold: true, size: 22, color: 'CA8A04' }), new TextRun({ text: '(6-12 mois)   ', size: 20 }),
                        new TextRun({ text: 'J4 ', bold: true, size: 22, color: '16A34A' }), new TextRun({ text: '(12+ mois)', size: 20 })
                    ]
                }));
                children.push(new Table({
                    width: { size: 100, type: WidthType.PERCENTAGE }, rows: [
                        new TableRow({ children: [hdrCell('Mesure', 36), hdrCell('Risques', 12), hdrCell('Cat.', 12), hdrCell('Resp.', 16), hdrCell('Jalon', 12), hdrCell('Statut', 12)] }),
                        ...D.measures.map(m => {
                            const riskIds = m.riskIds || [m.risk].filter(Boolean);
                            const riskLabels = riskIds.map(rid => { const r = risks.find(x => x.id === rid); return r ? 'R' + r.i : null; }).filter(Boolean).join(', ');
                            const jc = m.jalon === 1 ? 'DC2626' : m.jalon === 2 ? 'EA580C' : m.jalon === 3 ? 'CA8A04' : '16A34A';
                            const sc = m.status === 'done' ? { t: 'Fait', c: '16A34A' } : m.status === 'ongoing' ? { t: 'En cours', c: 'EAB308' } : { t: 'À faire', c: '64748B' };
                            return new TableRow({ children: [cell(m.measure, 36), cell(riskLabels || '-', 12), cell(m.cat, 12), cell(m.resp || '-', 16), cell('J' + (m.jalon || 1), 12, { center: true, bold: true, color: jc }), cell(sc.t, 12, { center: true, bold: true, color: sc.c })] });
                        })
                    ]
                }));

                // 5.4 Risques Résiduels
                if (D.risquesResiduels && D.risquesResiduels.length) {
                    children.push(new Paragraph({ spacing: { before: 400 }, children: [new TextRun({ text: '5.4 Évaluation des Risques Résiduels', bold: true, size: 26, color: '1E40AF' })] }));

                    // Graphique évolution
                    const improved = D.risquesResiduels.filter(rr => { const r = risks.find(x => x.id === rr.riskId); return r && (r.level > (rr.gRes * rr.vRes)); }).length;
                    const unchanged = D.risquesResiduels.filter(rr => { const r = risks.find(x => x.id === rr.riskId); return r && (r.level === (rr.gRes * rr.vRes)); }).length;
                    const degraded = D.risquesResiduels.filter(rr => { const r = risks.find(x => x.id === rr.riskId); return r && (r.level < (rr.gRes * rr.vRes)); }).length;
                    const rrTotal = D.risquesResiduels.length || 1;
                    children.push(new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE }, rows: [
                            new TableRow({ children: [cell('Améliorés (↓)', 30, { noBorder: true, color: '22C55E', bold: true }), progressBar(improved / rrTotal * 100, '22C55E', 50), cell(improved + ' / ' + D.risquesResiduels.length, 20, { noBorder: true, center: true, bold: true, color: '22C55E' })] }),
                            new TableRow({ children: [cell('Inchangés (=)', 30, { noBorder: true, color: 'EAB308', bold: true }), progressBar(unchanged / rrTotal * 100, 'EAB308', 50), cell(unchanged + ' / ' + D.risquesResiduels.length, 20, { noBorder: true, center: true, bold: true, color: 'EAB308' })] }),
                            new TableRow({ children: [cell('Dégradés (↑)', 30, { noBorder: true, color: 'DC2626', bold: true }), progressBar(degraded / rrTotal * 100, 'DC2626', 50), cell(degraded + ' / ' + D.risquesResiduels.length, 20, { noBorder: true, center: true, bold: true, color: 'DC2626' })] })
                        ]
                    }));

                    // Tableau des risques résiduels
                    children.push(new Paragraph({ spacing: { before: 200 }, children: [new TextRun({ text: 'Détail des évaluations résiduelles:', bold: true, size: 22, color: '7C3AED' })] }));
                    children.push(new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE }, rows: [
                            new TableRow({ children: [hdrCell('Risque', 22), hdrCell('Initial', 13), hdrCell('Résiduel', 13), hdrCell('Évol.', 9), hdrCell('Jalon', 9), hdrCell('Décision', 13), hdrCell('Justification', 21)] }),
                            ...D.risquesResiduels.map(rr => {
                                const r = risks.find(x => x.id === rr.riskId);
                                if (!r) return null;
                                const lvlI = r.level; const lvlR = rr.gRes * rr.vRes;
                                const diff = lvlI - lvlR;
                                const diffTxt = diff > 0 ? '↓ -' + diff : diff < 0 ? '↑ +' + Math.abs(diff) : '=';
                                const diffC = diff > 0 ? '22C55E' : diff < 0 ? 'DC2626' : '64748B';
                                const lvlIC = lvlI <= 4 ? '22C55E' : lvlI <= 8 ? 'EAB308' : lvlI <= 12 ? 'F97316' : 'DC2626';
                                const lvlRC = lvlR <= 4 ? '22C55E' : lvlR <= 8 ? 'EAB308' : lvlR <= 12 ? 'F97316' : 'DC2626';
                                const jc = rr.jalon === 1 ? 'DC2626' : rr.jalon === 2 ? 'EA580C' : rr.jalon === 3 ? 'CA8A04' : '16A34A';
                                const decW = rr.decision === 'accepté' ? { t: 'Accepté', c: '16A34A' } : rr.decision === 'éviter' ? { t: 'Éviter', c: 'DC2626' } : rr.decision === 'transféré' ? { t: 'Transféré', c: '3B82F6' } : rr.decision === 'réduit' ? { t: 'Réduit', c: 'CA8A04' } : { t: '-', c: '64748B' };
                                return new TableRow({
                                    children: [
                                        cell('R' + r.i + ': ' + r.name.substring(0, 20) + '...', 25, { bold: true, color: 'EA580C' }),
                                        cell('G' + r.g + '×V' + r.v + '=' + lvlI, 15, { center: true, color: lvlIC, bold: true }),
                                        cell('G' + rr.gRes + '×V' + rr.vRes + '=' + lvlR, 15, { center: true, color: lvlRC, bold: true }),
                                        cell(diffTxt, 10, { center: true, color: diffC, bold: true }),
                                        cell(rr.jalon ? 'J' + rr.jalon : '-', 9, { center: true, bold: true, color: rr.jalon ? jc : '64748B' }),
                                        cell(decW.t + (rr.decision === 'transféré' && rr.transferTarget ? ' → ' + rr.transferTarget : ''), 13, { center: true, bold: true, color: decW.c }),
                                        cell(rr.justification || '-', 21)
                                    ]
                                });
                            }).filter(Boolean)
                        ]
                    }));

                    // Comparaison cartographies
                    children.push(new Paragraph({ spacing: { before: 300 }, children: [new TextRun({ text: 'Comparaison des Cartographies (Avant / Après)', bold: true, size: 24, color: '1E40AF' })] }));

                    // Matrice initiale
                    children.push(new Paragraph({ spacing: { before: 150 }, children: [new TextRun({ text: 'Cartographie Initiale:', bold: true, size: 20, color: 'DC2626' })] }));
                    const matrixRowsI = [new TableRow({ children: [cell('G \\ V', 12, { center: true, bold: true, fill: 'F1F5F9' }), cell('V1', 22, { center: true, bold: true, color: '22C55E', fill: 'F1F5F9' }), cell('V2', 22, { center: true, bold: true, color: 'EAB308', fill: 'F1F5F9' }), cell('V3', 22, { center: true, bold: true, color: 'F97316', fill: 'F1F5F9' }), cell('V4', 22, { center: true, bold: true, color: 'DC2626', fill: 'F1F5F9' })] })];
                    for (let g = 4; g >= 1; g--) {
                        const gc = g === 1 ? '22C55E' : g === 2 ? 'EAB308' : g === 3 ? 'F97316' : 'DC2626';
                        const rowCells = [cell('G' + g, 12, { center: true, bold: true, color: gc, fill: 'F1F5F9' })];
                        for (let v = 1; v <= 4; v++) {
                            const lvl = g * v; const bg = lvl <= 4 ? 'DCFCE7' : lvl <= 8 ? 'FEF9C3' : lvl <= 12 ? 'FFEDD5' : 'FEE2E2';
                            const cr = risks.filter(r => r.g === g && r.v === v).map(r => 'R' + r.i).join(' ');
                            rowCells.push(cell(cr || '', 22, { center: true, bold: true, fill: bg }));
                        }
                        matrixRowsI.push(new TableRow({ children: rowCells }));
                    }
                    children.push(new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: matrixRowsI }));

                    // Matrice résiduelle
                    children.push(new Paragraph({ spacing: { before: 200 }, children: [new TextRun({ text: 'Cartographie Résiduelle:', bold: true, size: 20, color: '22C55E' })] }));
                    const risksRes = risks.map(r => { const rr = latestRR(r.id); return rr ? { ...r, g: rr.gRes, v: rr.vRes, level: rr.gRes * rr.vRes } : r; });
                    const matrixRowsR = [new TableRow({ children: [cell('G \\ V', 12, { center: true, bold: true, fill: 'F1F5F9' }), cell('V1', 22, { center: true, bold: true, color: '22C55E', fill: 'F1F5F9' }), cell('V2', 22, { center: true, bold: true, color: 'EAB308', fill: 'F1F5F9' }), cell('V3', 22, { center: true, bold: true, color: 'F97316', fill: 'F1F5F9' }), cell('V4', 22, { center: true, bold: true, color: 'DC2626', fill: 'F1F5F9' })] })];
                    for (let g = 4; g >= 1; g--) {
                        const gc = g === 1 ? '22C55E' : g === 2 ? 'EAB308' : g === 3 ? 'F97316' : 'DC2626';
                        const rowCells = [cell('G' + g, 12, { center: true, bold: true, color: gc, fill: 'F1F5F9' })];
                        for (let v = 1; v <= 4; v++) {
                            const lvl = g * v; const bg = lvl <= 4 ? 'DCFCE7' : lvl <= 8 ? 'FEF9C3' : lvl <= 12 ? 'FFEDD5' : 'FEE2E2';
                            const cr = risksRes.filter(r => r.g === g && r.v === v).map(r => 'R' + r.i).join(' ');
                            rowCells.push(cell(cr || '', 22, { center: true, bold: true, fill: bg }));
                        }
                        matrixRowsR.push(new TableRow({ children: rowCells }));
                    }
                    children.push(new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: matrixRowsR }));
                }

                const doc = new Document({
                    styles: { default: { document: { run: { font: 'Arial', size: 22 } } } },
                    sections: [{ properties: { page: { size: { width: 11906, height: 16838 }, margin: { top: 720, right: 720, bottom: 720, left: 720 } } }, children }]
                });

                Packer.toBlob(doc).then(blob => { saveAs(blob, 'EBIOS_RM_' + (D.meta.studyName || 'Rapport').replace(/[^a-zA-Z0-9]/g, '_') + '_' + D.meta.date + '.docx'); });
            } catch (e) { alert('Erreur export Word: ' + e.message); console.error(e); }
        }

        // ============ INIT ============
        checkSaved();
        document.querySelector('[data-w="1"]').classList.add('active');
    </script>
</body>
</html>
